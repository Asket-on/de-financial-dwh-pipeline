name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit tracked source files for secrets
        run: python scripts/check_no_secrets.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run local warehouse pipeline
        run: python -m src.local_warehouse

      - name: Verify reproducible dashboard artifact
        run: python scripts/build_dashboard.py --check

      - name: Run Docker Compose pipeline
        run: docker compose up --abort-on-container-exit --exit-code-from pipeline

      - name: Clean up Docker Compose
        if: always()
        run: docker compose down --volumes

      - name: Verify Airflow DAG discovery
        run: |
          docker run --rm \
            -e AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/project/dags \
            -e PYTHONPATH=/opt/airflow/project \
            -v "$PWD:/opt/airflow/project:ro" \
            apache/airflow:2.10.5 \
            bash -c 'airflow db init >/dev/null && airflow dags list --output plain' > airflow-dags.txt
          grep -q "financial_dwh_pipeline" airflow-dags.txt
          grep -q "build_financial_global_metrics_mart" airflow-dags.txt
          grep -q "load_financial_sources_to_staging" airflow-dags.txt

      - name: Verify bounded Airflow catchup
        run: python scripts/run_airflow_catchup.py --cleanup

      - name: Verify PostgreSQL-compatible warehouse SQL
        run: docker compose -f docker-compose.postgres.yml up --abort-on-container-exit --exit-code-from warehouse-verifier

      - name: Clean up PostgreSQL warehouse
        if: always()
        run: docker compose -f docker-compose.postgres.yml down --volumes

      - name: Compile Python sources
        run: python -m compileall -q src dags tests scripts
