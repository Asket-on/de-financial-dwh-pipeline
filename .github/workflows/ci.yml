name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Audit tracked source files for secrets
        run: python scripts/check_no_secrets.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run local warehouse pipeline
        run: python -m src.local_warehouse

      - name: Run Docker Compose pipeline
        run: docker compose up --abort-on-container-exit --exit-code-from pipeline

      - name: Clean up Docker Compose
        if: always()
        run: docker compose down --volumes

      - name: Compile Python sources
        run: python -m compileall -q src dags tests scripts
